name: vvf_media_vault
description: A clean, private media vault app. Store, organize, and protect your photos and videos — all data stays on your device.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.0

  # Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Media Picker
  image_picker: ^1.1.1

  # Media Viewer
  photo_view: ^0.14.0

  # Video Player
  video_player: ^2.8.6
  chewie: ^1.8.1

  # Thumbnails
  video_thumbnail: ^0.5.3

  # Permissions
  permission_handler: ^11.3.1

  # Path utilities
  path: ^1.9.0

  # MIME type detection
  mime: ^1.0.5

  # Share
  share_plus: ^9.0.0

  # Haptics
  flutter_vibrate: ^1.3.0

  # Icons
  cupertino_icons: ^1.0.6

  # Crypto for secure storage
  encrypt: ^5.0.1

  # Local notifications
  flutter_local_notifications: ^17.1.2

  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
